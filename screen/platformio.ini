; Minimal bootstrap: WiFi AP + raw Update API — no display code, no extra libs.
; Compiles to ~100 KB, fits in the stock firmware's small OTA staging slot.
; Flash this first via the stock /update_ota endpoint, then use
; http://192.168.4.1/flash (form) or curl to push the full firmware.
[env:bootstrap]
platform = espressif8266
board = esp12e
framework = arduino
board_build.ldscript = eagle.flash.4m2m.ld
monitor_speed = 115200
upload_speed = 921600
build_src_filter = -<*> +<main_bootstrap.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0

[env:geekmagic_ultra]
platform = espressif8266
board = esp12e
framework = arduino
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m2m.ld
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<*> -<main_bootstrap.cpp>

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
    ; the maintained ESP32Async fork — never mix with me-no-dev/ESPAsyncWebServer
    ; 1.x: two versions of the same classes linked together corrupt the server
    esp32async/ESPAsyncWebServer @ ^3.11.0
    links2004/WebSockets @ ^2.4.0

build_flags =
    -DUSER_SETUP_LOADED=1
    -DCORE_DEBUG_LEVEL=0
    -include "${PROJECT_DIR}/include/User_Setup.h"
