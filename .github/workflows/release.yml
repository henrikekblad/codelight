name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Required secrets (set once in repo Settings → Secrets → Actions):
    #   ANDROID_KEYSTORE   — base64-encoded keystore: base64 -w0 keystore.jks
    #   ANDROID_STORE_PASS — keystore password
    #   ANDROID_KEY_ALIAS  — key alias used when creating the keystore
    #   ANDROID_KEY_PASS   — key password
    #
    # One-time keystore generation:
    #   keytool -genkeypair -v -keystore keystore.jks -alias codelight \
    #     -keyalg RSA -keysize 2048 -validity 10000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-read-only: false

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/keystore.jks

      - name: Build release APK
        working-directory: android
        env:
          SIGNING_STORE_PATH:     ${{ github.workspace }}/android/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASS }}
          SIGNING_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASS }}
        run: gradle assembleRelease

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/codelight-${{ github.ref_name }}.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: codelight ${{ github.ref_name }}
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/codelight-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true

  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('screen/platformio.ini') }}
          restore-keys: platformio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: screen
        run: pio run

      - name: Rename binary
        run: |
          cp screen/.pio/build/geekmagic_ultra/firmware.bin \
             screen/.pio/build/geekmagic_ultra/codelight-${{ github.ref_name }}.bin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: codelight ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Flash `codelight-${{ github.ref_name }}.bin` to your GeekMagic Ultra.
            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full flashing and setup instructions.

            ### Quick start

            **Stock OTA** (no disassembly — works on a fresh device):
            1. Connect your computer to the device's WiFi AP
            2. Open `http://192.168.4.1/update` in your browser
            3. Upload `codelight-${{ github.ref_name }}.bin`
            4. After reboot, connect the device to your network via the setup page

            **ElegantOTA** (already running codelight):
            - Open `http://<device>.local/update` and upload the `.bin`

            ### Companion script

            ```bash
            pip install websockets zeroconf
            python3 companion/codelight.py --name my-laptop
            ```

            The screen discovers the companion automatically via mDNS — no IP address needed.
          files: screen/.pio/build/geekmagic_ultra/codelight-${{ github.ref_name }}.bin
          fail_on_unmatched_files: true
