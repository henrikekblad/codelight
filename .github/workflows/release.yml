name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Required secrets (set once in repo Settings → Secrets → Actions):
    #   ANDROID_KEYSTORE   — base64-encoded keystore: base64 -w0 keystore.jks
    #   ANDROID_STORE_PASS — keystore password
    #   ANDROID_KEY_ALIAS  — key alias used when creating the keystore
    #   ANDROID_KEY_PASS   — key password
    #
    # One-time keystore generation:
    #   keytool -genkeypair -v -keystore keystore.jks -alias codelight \
    #     -keyalg RSA -keysize 2048 -validity 10000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.14.5'
          cache-read-only: false

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/keystore.jks

      - name: Build release APK
        working-directory: android
        env:
          SIGNING_STORE_PATH:     ${{ github.workspace }}/android/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASS }}
          SIGNING_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASS }}
        run: gradle assembleRelease

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/codelight-${{ github.ref_name }}.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: codelight ${{ github.ref_name }}
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/codelight-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true

  build-vscode:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and package extension
        working-directory: vscode-extension
        run: |
          npm install
          npx vsce package --out codelight-${{ github.ref_name }}.vsix

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: codelight ${{ github.ref_name }}
          generate_release_notes: true
          files: vscode-extension/codelight-${{ github.ref_name }}.vsix
          fail_on_unmatched_files: true

  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('screen/platformio.ini') }}
          restore-keys: platformio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: screen
        run: pio run

      - name: Rename binaries
        run: |
          cp screen/.pio/build/geekmagic_ultra/firmware.bin \
             screen/.pio/build/geekmagic_ultra/codelight-${{ github.ref_name }}.bin
          # gzipped variant for flashing from the legacy GeekMagic stock firmware, whose
          # flash layout leaves too little OTA staging space for the plain bin
          gzip -9 -k screen/.pio/build/geekmagic_ultra/codelight-${{ github.ref_name }}.bin
          cp screen/.pio/build/bootstrap/firmware.bin \
             screen/.pio/build/bootstrap/codelight-bootstrap-${{ github.ref_name }}.bin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: codelight ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Assets

            | File | Description |
            |------|-------------|
            | `codelight-${{ github.ref_name }}.bin` | ESP8266 firmware for GeekMagic Ultra |
            | `codelight-${{ github.ref_name }}.bin.gz` | Same firmware, gzipped for legacy stock firmware OTA |
            | `codelight-bootstrap-${{ github.ref_name }}.bin` | Bootstrap image for KR_SDP two-step install |
            | `codelight-${{ github.ref_name }}.apk` | Android home-screen widget |
            | `codelight-${{ github.ref_name }}.vsix` | VSCode extension (status bar + remote permission approval) |

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.

            ### Flash firmware (GeekMagic Ultra)

            **Stock OTA** (no disassembly — works on a fresh device):

            The `buildAndOTAUpdate.sh` script handles both stock firmware variants automatically:
            ```bash
            ./screen/buildAndOTAUpdate.sh 192.168.4.1
            ```
            - **KR_SDP firmware** (most devices bought after mid-2024): flash `codelight-bootstrap-${{ github.ref_name }}.bin` via the stock `/update_ota` endpoint, then upload the main firmware via the bootstrap — the script does both steps automatically.
            - **Legacy stock firmware**: upload `codelight-${{ github.ref_name }}.bin.gz` via `http://192.168.4.1/update` (the plain `.bin` exceeds the stock OTA staging area).

            After flashing, connect the device to your network via the setup page at `http://192.168.4.1`.

            **Already running codelight:**
            - Open the device's settings page and use the *Firmware update* form
              at the bottom (or go directly to `http://<device>.local:81/update`),
              then upload the `.bin`

            ### Companion script

            ```bash
            pip install websockets zeroconf dbus-fast   # dbus-fast optional: GNOME extension
            python3 companion/codelight.py --name my-laptop
            ```

            The screen and Android widget discover the companion automatically via mDNS.
            The GNOME extension connects via D-Bus — no configuration needed.
          files: |
            screen/.pio/build/geekmagic_ultra/codelight-${{ github.ref_name }}.bin
            screen/.pio/build/geekmagic_ultra/codelight-${{ github.ref_name }}.bin.gz
            screen/.pio/build/bootstrap/codelight-bootstrap-${{ github.ref_name }}.bin
          fail_on_unmatched_files: true
